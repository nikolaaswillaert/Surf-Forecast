services:
  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    shm_size: 512mb
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_HOOK_URL=http://172.18.0.1:5000/webhook
      - WHATSAPP_HOOK_EVENTS=message.any
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
    volumes:
      - waha_sessions:/app/.sessions

  bot:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Override so bot talks to the waha container by service name
      - WAHA_BASE_URL=http://waha:3000
      - WEBHOOK_HOST=0.0.0.0
    volumes:
      # Persist birthdays.json on the host
      - ./birthdays.json:/app/birthdays.json
    depends_on:
      - waha

volumes:
  waha_sessions:
